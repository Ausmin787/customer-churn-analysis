[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",  # line-too-long — visualization code uses intentional long annotation strings
    "W291",  # trailing-whitespace — alignment spacing in constant blocks
    "W293",  # whitespace-before-comment
    "E221",  # multiple-spaces-before-operator — used for visual alignment of color constants
    "E241",  # multiple-spaces-after-comma
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
